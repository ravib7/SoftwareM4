<!doctype html>

    <link rel="stylesheet" href="./assets/css/style.css">

<body>

    <nav class="navbar navbar-expand-lg p-3">
        <div class="container">
            <a class="navbar-brand fs-3 fw-bold" href="#">SoftwareM4</a>

            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
